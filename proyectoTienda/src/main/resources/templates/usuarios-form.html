<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios Formulario</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        form {
            width: 100%;
        }

        .campo {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }

        .acciones {
            margin-top: 15px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-guardar {
            background-color: #01415B;
            color: white;
        }

        .btn-volver {
            text-decoration: none;
            margin-left: 10px;
            background-color: #01415B;
        }
    </style>

</head>
<body>
<div>

<h1 th:text="${modoEdicion} ? 'Editar Usuario' : 'Nuevo Usuario'"></h1>

<form th:action="${modoEdicion} ? @{/usuarios/actualizar/{id}(id=${usuario.codigoUsuario})} : @{/usuarios/guardar}"
      th:object="${usuario}"
      method="post">

    <input type="hidden" th:field="*{codigoUsuario}">

    Username: <input type="text" th:field="*{username}"><br>
    Password: <input type="password" th:field="*{password}"><br>
    Email: <input type="email" th:field="*{email}"><br>
    Rol: <input type="text" th:field="*{rol}"><br>
    Estado: <input type="checkbox" th:field="*{estado}"><br>

    <button type="submit">Guardar</button>
</form>

<a th:href="@{/usuarios}">Volver</a>
</div>
</body>
</html>
