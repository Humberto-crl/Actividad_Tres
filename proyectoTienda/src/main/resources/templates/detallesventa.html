<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalles Venta</title>

    <style>
        :root {
            --color-primario: #01415B;
            --color-secundario: #0A6E8D;
            --color-fondo: #f8fafc;
            --color-texto: #333;
            --color-blanco: #ffffff;
            --color-gris: #e5e7eb;
            --color-hover: #012f42;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            margin: 0;
            padding: 40px;
        }

        .contenedor {
            max-width: 1200px;
            margin: auto;
            background-color: var(--color-blanco);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.07);
        }

        .titulo {
            text-align: center;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--color-primario);
        }

        h1, h2, h3 {
            margin-bottom: 20px;
            color: var(--color-primario);
        }

        a {
            text-decoration: none;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-nuevo {
            background-color: var(--color-primario);
            color: var(--color-blanco);
        }

        .btn-editar {
            background-color: var(--color-secundario);
            color: var(--color-blanco);
        }

        .btn-eliminar {
            background-color: #c62828;
            color: var(--color-blanco);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-nuevo:hover,
        .btn-editar:hover {
            background-color: var(--color-hover);
        }

        .btn-eliminar:hover {
            background-color: #9b1c1c;
        }

        .boton {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 18px;
            background-color: var(--color-secundario);
            color: var(--color-blanco);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
        }

        .boton:hover {
            background-color: var(--color-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 15px;
        }

        thead {
            background-color: var(--color-primario);
            color: var(--color-blanco);
        }

        th, td {
            padding: 12px 14px;
            text-align: center;
        }

        th {
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid var(--color-gris);
        }

        tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }

        tbody tr:hover {
            background-color: #eef6fa;
        }

        .mensaje {
            padding: 12px 18px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .mensaje-success {
            background-color: #d1fae5;
            color: #065f46;
        }

        .mensaje-error {
            background-color: #fee2e2;
            color: #7f1d1d;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            table {
                font-size: 13px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 13px;
            }
        }
    </style>

</head>
<body>

<div class="contenedor">
    <a th:href="@{/detalles/nuevo}">Nuevo</a>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>PRODUCTO</th>
            <th>CANTIDAD</th>
            <th>SUBTOTAL</th>
            <th>TOTAL</th>
            <th>ACCIONES</th>
        </tr>

        <tr th:each="d : ${detalles}">
            <td th:text="${d.codigoDetalleVenta}"></td>
            <td th:text="${d.producto.nombreProducto}"></td>
            <td th:text="${d.cantidad}"></td>
            <td th:text="${d.subtototal}"></td>
            <td th:text="${d.total}"></td>
            <td>
                <a th:href="@{/detalles/editar/{id}(id=${v.codigoDetalleVenta})}">Editar</a>


                <a th:href="@{/detalles/eliminar/{id}(id=${d.codigoDetalleVenta})}"
                   onclick="return confirm('¿Seguro?')"
                   class="btn btn-eliminar"
                >Eliminar</a>
            </td>
        </tr>
    </table>
    <a class="boton" th:href="@{/home}">Volver</a>
</div>

</body>
</html>
